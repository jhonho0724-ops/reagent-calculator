<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시약 계산기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🧪</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f5f2;
  --surface:#ffffff;
  --surface2:#fafaf8;
  --border:rgba(0,0,0,0.09);
  --border-em:rgba(0,0,0,0.16);
  --text:#181816;
  --text2:#636360;
  --text3:#9c9c98;
  --accent:#185FA5;
  --accent-bg:#EBF3FC;
  --accent-bd:rgba(24,95,165,0.25);
  --accent-txt:#0C447C;
  --teal:#0F6E56;
  --teal-bg:#E1F5EE;
  --teal-bd:#9FE1CB;
  --teal-txt:#085041;
  --amber:#7A4800;
  --amber-bg:#FEF0D6;
  --amber-bd:#FAC775;
  --amber-txt:#633806;
  --gray-bg:#f0f0ec;
  --radius:8px;
  --radius-lg:12px;
  --mono:'JetBrains Mono','Fira Mono','Courier New',monospace;
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#141412;
    --surface:#1f1f1d;
    --surface2:#242422;
    --border:rgba(255,255,255,0.08);
    --border-em:rgba(255,255,255,0.15);
    --text:#e6e6e2;
    --text2:#8c8c88;
    --text3:#5c5c58;
    --accent:#5BA3E0;
    --accent-bg:rgba(24,95,165,0.18);
    --accent-bd:rgba(91,163,224,0.3);
    --accent-txt:#85B7EB;
    --teal:#2ab88a;
    --teal-bg:rgba(15,110,86,0.18);
    --teal-bd:rgba(42,184,138,0.3);
    --teal-txt:#5DCAA5;
    --amber:#E8972A;
    --amber-bg:rgba(122,72,0,0.18);
    --amber-bd:rgba(232,151,42,0.3);
    --amber-txt:#FAC775;
    --gray-bg:rgba(255,255,255,0.04);
  }
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  line-height:1.5;
}

/* ── Header ── */
header{
  background:var(--surface);
  border-bottom:.5px solid var(--border-em);
  padding:0 1.75rem;
  height:52px;
  display:flex;
  align-items:center;
  gap:10px;
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  width:30px;height:30px;
  background:var(--accent-bg);
  border:.5px solid var(--accent-bd);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.app-name{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.app-desc{font-size:12px;color:var(--text3);margin-left:2px}
.save-flash{
  margin-left:auto;
  font-size:11px;color:var(--teal);
  opacity:0;
  transition:opacity .4s;
  display:flex;align-items:center;gap:4px;
}
.save-flash.show{opacity:1}

/* ── Main ── */
main{
  max-width:860px;
  margin:0 auto;
  padding:1.5rem 1.5rem 5rem;
}

/* ── Tabs ── */
.tab-bar{
  display:flex;
  align-items:flex-end;
  gap:2px;
  border-bottom:.5px solid var(--border-em);
  margin-bottom:1.5rem;
}
.tab-btn{
  font-size:13px;padding:7px 16px;
  cursor:pointer;
  background:transparent;
  color:var(--text2);
  border:.5px solid transparent;
  border-bottom:none;
  border-radius:8px 8px 0 0;
  font-family:inherit;
  white-space:nowrap;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.on{
  background:var(--surface);
  color:var(--text);font-weight:500;
  border-color:var(--border-em);
  margin-bottom:-1px;position:relative;z-index:1;
}
.tab-x{
  margin-left:5px;opacity:.3;cursor:pointer;font-size:13px;
}
.tab-x:hover{opacity:.7}
.add-tab{
  font-size:12px;padding:7px 12px;
  border:none;background:transparent;
  cursor:pointer;color:var(--text3);
  font-family:inherit;
  display:flex;align-items:center;gap:4px;
  margin-bottom:1px;
}
.add-tab:hover{color:var(--text2)}
.tab-edit-input{
  font-size:13px;padding:5px 12px;
  border:.5px solid var(--accent-bd);
  border-bottom:none;
  border-radius:8px 8px 0 0;
  background:var(--surface);
  color:var(--text);
  font-family:inherit;
  outline:none;
  margin-bottom:-1px;
}

/* ── Panel grid ── */
.panel{
  display:grid;
  grid-template-columns:220px minmax(0,1fr);
  gap:24px;
}

/* ── Input section ── */
.sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 9px}
.sec:first-child{margin-top:0}

.frow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.frow label{font-size:13px;color:var(--text)}

input[type=text],input[type=number]{
  background:var(--surface);
  border:.5px solid var(--border-em);
  border-radius:var(--radius);
  padding:5px 8px;
  font-size:13px;
  color:var(--text);
  font-family:inherit;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus,input[type=number]:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-bg);
}
input[type=number]::-webkit-inner-spin-button{opacity:.4}

.sample-row{display:flex;align-items:center;gap:5px}
.step-btn{
  width:28px;height:28px;
  border:.5px solid var(--border-em);
  border-radius:var(--radius);
  background:var(--surface);
  cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:background .1s;
  font-family:inherit;
}
.step-btn:hover{background:var(--gray-bg)}
.sample-input{
  width:62px;text-align:center;
  font-size:15px;font-weight:600;
  font-family:var(--mono);
  border:.5px solid var(--border-em);
  border-radius:var(--radius);
  padding:4px 6px;
  background:var(--surface);
  color:var(--text);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.sample-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-bg);
}
.unit{font-size:12px;color:var(--text3)}

.s-grp{display:flex;gap:4px;align-items:center}
.s-btn{
  font-size:11px;padding:3px 8px;
  border-radius:var(--radius);cursor:pointer;
  border:.5px solid var(--border-em);
  background:transparent;color:var(--text2);
  font-family:inherit;transition:all .1s;
}
.s-btn:hover{background:var(--gray-bg)}
.s-btn.on{border-color:var(--accent-bd);background:var(--accent-bg);color:var(--accent-txt)}
.surplus-n{width:42px;text-align:right;font-size:12px!important;padding:3px 6px!important}

.vol-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vol-row label{font-size:12px;color:var(--text)}
.vol-right{display:flex;align-items:center;gap:5px}
.vol-right input{width:56px;text-align:right;font-size:12px}

.ab-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;margin-bottom:8px}
.ab-hdr-row .sec{margin:0}
.add-ab{
  font-size:11px;padding:2px 8px;
  border:.5px solid var(--border-em);
  border-radius:var(--radius);
  background:transparent;cursor:pointer;
  color:var(--text2);font-family:inherit;
  display:flex;align-items:center;gap:3px;
}
.add-ab:hover{background:var(--gray-bg)}

.ab-cols{display:grid;grid-template-columns:1fr 70px 52px 22px;gap:5px;margin-bottom:4px}
.ab-cols span{font-size:10px;color:var(--text3)}
.ab-cols span:nth-child(2),.ab-cols span:nth-child(3){text-align:right}

.ab-row{display:grid;grid-template-columns:1fr 70px 52px 22px;gap:5px;align-items:center;margin-bottom:6px}
.ab-row input{font-size:12px}
.ab-row input:nth-child(3){text-align:right}
.dil-wrap{display:flex;align-items:center;gap:3px}
.dil-wrap span{font-size:11px;color:var(--text3);flex-shrink:0}
.dil-wrap input{flex:1;min-width:0;text-align:right}
.del-btn{
  border:none;background:transparent;cursor:pointer;
  color:var(--text3);padding:0;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.del-btn:disabled{opacity:.2;cursor:default}
.del-btn:not(:disabled):hover{color:#E24B4A}

/* ── Result cards ── */
.rsec{
  font-size:11px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;
  font-weight:600;margin:14px 0 7px;
}
.rsec:first-child{margin-top:0}
.rcard{
  border:.5px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:9px;
}
.rhead{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:.5px solid;
}
.rhead-l{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.rbadge{font-family:var(--mono);font-size:14px;font-weight:600}
.rbody{padding:8px 14px 6px}
.rrow{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:5px 0;border-bottom:.5px solid var(--border);font-size:13px;
}
.rrow:last-child{border:none}
.rlbl{color:var(--text2)}
.rval{font-family:var(--mono)}
.rval.big{font-size:15px;font-weight:600}
.rsub{font-size:11px;color:var(--text3);text-align:right}
.rdivider{margin:7px 0 5px;padding-top:5px;border-top:.5px dashed var(--border)}
.rdivider-lbl{font-size:11px;color:var(--text3);margin-bottom:5px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{
  font-size:11px;
  background:var(--gray-bg);
  border:.5px solid var(--border);
  border-radius:var(--radius);
  padding:2px 8px;color:var(--text2);
}

.c-blue{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent-txt)}
.c-teal{background:var(--teal-bg);border-color:var(--teal-bd);color:var(--teal-txt)}
.c-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-txt)}
.c-gray{background:var(--gray-bg);border-color:var(--border);color:var(--text2)}

.copy-btn{
  display:flex;align-items:center;gap:6px;
  font-size:12px;padding:7px 14px;
  border:.5px solid var(--border-em);
  border-radius:var(--radius);
  background:transparent;cursor:pointer;
  color:var(--text2);font-family:inherit;
  margin-top:10px;transition:all .1s;
}
.copy-btn:hover{background:var(--gray-bg);color:var(--text)}
.copy-btn.done{border-color:var(--teal-bd);color:var(--teal-txt);background:var(--teal-bg)}

/* ── Responsive ── */
@media(max-width:640px){
  main{padding:1rem 1rem 4rem}
  .panel{grid-template-columns:1fr}
  header{padding:0 1rem}
}

/* ── Tabler icons ── */
@import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css');
</style>
</head>
<body>

<header>
  <div class="logo">🧪</div>
  <span class="app-name">시약 계산기</span>
  <span class="app-desc">Reagent Volume Calculator</span>
  <div class="save-flash" id="save-flash">
    <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
    자동 저장됨
  </div>
</header>

<main>
  <div id="app"></div>
</main>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

let _n = 200;
const uid = () => String(++_n);

// ── Helpers ──────────────────────────────────────────────────────────────────
function roundNice(v) {
  if (!v || v <= 0) return 0;
  if (v <= 5)    return Math.ceil(v);
  if (v <= 20)   return Math.ceil(v/2)*2;
  if (v <= 50)   return Math.ceil(v/5)*5;
  if (v <= 100)  return Math.ceil(v/10)*10;
  if (v <= 250)  return Math.ceil(v/25)*25;
  if (v <= 1000) return Math.ceil(v/50)*50;
  if (v <= 5000) return Math.ceil(v/100)*100;
  return Math.ceil(v/500)*500;
}

const fV = v => {
  if (!v || v <= 0) return '0 mL';
  if (v >= 1000) return `${+(v/1000).toFixed(1)} L`;
  return `${v} mL`;
};
const fM = mg => {
  if (!mg || mg <= 0) return '0 mg';
  if (mg >= 1000) return `${+(mg/1000).toFixed(2)} g`;
  return `${Math.round(mg)} mg`;
};
const fMsub = mg => mg >= 1000 ? `(${Math.round(mg).toLocaleString()} mg)` : null;
const fLiq = mL => {
  if (!mL || mL <= 0) return '0 μL';
  const uL = mL * 1000;
  if (uL < 0.1) return '< 0.1 μL';
  if (uL < 1000) return `${+uL.toFixed(1)} μL`;
  return fV(mL);
};
const fTriton = uL => uL >= 1000 ? `${+(uL/1000).toFixed(2)} mL` : `${+uL.toFixed(1)} μL`;

// ── Default config ────────────────────────────────────────────────────────────
function defCfg() {
  return {
    samples: 8, surplus: 20,
    washVol: 36, blockVol: 4,
    primaries:   [{ id: uid(), name: '1차 항체 #1', dilution: '500',  vol: '4' }],
    secondaries: [{ id: uid(), name: '2차 항체 #1', dilution: '1000', vol: '4' }],
  };
}

// ── Calculation ───────────────────────────────────────────────────────────────
function calcIHC(cfg) {
  const n  = Math.max(+cfg.samples || 0, 0);
  const sf = 1 + Math.max(0, Math.min(+cfg.surplus || 0, 300)) / 100;
  const wash  = roundNice(n * (+cfg.washVol  || 0) * sf);
  const block = roundNice(n * (+cfg.blockVol || 0) * sf);
  const calcList = list => list.map(ab => {
    const adVol = roundNice(n * (+ab.vol || 0) * sf);
    return { ...ab, adVol, stock: adVol / Math.max(+ab.dilution || 1, 1) };
  });
  const pCalc   = calcList(cfg.primaries);
  const sCalc   = calcList(cfg.secondaries);
  const totalAD = [...pCalc, ...sCalc].reduce((s, a) => s + a.adVol, 0);
  const pbst    = roundNice(wash + block + totalAD);
  return {
    wash, block, pbst,
    tritonUL:   pbst * 3,
    pbsPortion: pbst - pbst * 0.003,
    blockBSAmg: block * 30,
    adTotal: totalAD,
    adBSAmg: totalAD * 10,
    pCalc, sCalc,
  };
}

// ── Text export ───────────────────────────────────────────────────────────────
function genText(name, cfg, r) {
  const lines = [
    `=== ${name} 시약 계산 결과 ===`,
    `샘플 수: ${cfg.samples}개  |  여유분: +${cfg.surplus}%`,
    '',
    `[PBST  0.3% Triton X-100]  총 ${fV(r.pbst)}`,
    `  · Triton X-100 : ${fTriton(r.tritonUL)}`,
    `  · 1× PBS (up to): ${fV(r.pbsPortion)}`,
    `  사용처: 세척 ${fV(r.wash)} / Blocking ${fV(r.block)} / Ab Diluent ${fV(r.adTotal)}`,
    '',
    `[Blocking Buffer  3% BSA in PBST]  총 ${fV(r.block)}`,
    `  · BSA         : ${fM(r.blockBSAmg)}${fMsub(r.blockBSAmg) ? '  '+fMsub(r.blockBSAmg) : ''}`,
    `  · 0.3% PBST (up to): ${fV(r.block)}`,
    '',
  ];
  if (r.adTotal > 0) {
    lines.push(
      `[Ab Diluent  1% BSA in PBST]  총 ${fV(r.adTotal)}`,
      `  · BSA         : ${fM(r.adBSAmg)}${fMsub(r.adBSAmg) ? '  '+fMsub(r.adBSAmg) : ''}`,
      `  · 0.3% PBST (up to): ${fV(r.adTotal)}`,
      '',
    );
  }
  if (r.pCalc.length) {
    lines.push('[1차 항체 working solution]');
    r.pCalc.forEach(ab => {
      lines.push(`  ${ab.name}  (1:${ab.dilution})  → ${fV(ab.adVol)}`);
      lines.push(`    · Ab Diluent     : ${fV(ab.adVol)}`);
      lines.push(`    · 항체 stock 첨가량: ${fLiq(ab.stock)}`);
    });
    lines.push('');
  }
  if (r.sCalc.length) {
    lines.push('[2차 항체 working solution]');
    r.sCalc.forEach(ab => {
      lines.push(`  ${ab.name}  (1:${ab.dilution})  → ${fV(ab.adVol)}`);
      lines.push(`    · Ab Diluent     : ${fV(ab.adVol)}`);
      lines.push(`    · 항체 stock 첨가량: ${fLiq(ab.stock)}`);
    });
  }
  return lines.join('\n');
}

// ── Small components ──────────────────────────────────────────────────────────
function RRow({ label, value, sub, bold }) {
  return (
    <div className="rrow">
      <span className="rlbl">{label}</span>
      <div style={{textAlign:'right'}}>
        <span className={`rval${bold?' big':''}`}>{value}</span>
        {sub && <div className="rsub">{sub}</div>}
      </div>
    </div>
  );
}

function RCard({ accent, icon, title, badge, children }) {
  return (
    <div className="rcard">
      <div className={`rhead c-${accent}`}>
        <div className="rhead-l">
          <i className={`ti ${icon}`} aria-hidden="true" style={{fontSize:15}}/>
          {title}
        </div>
        {badge && <span className="rbadge">{badge}</span>}
      </div>
      <div className="rbody">{children}</div>
    </div>
  );
}

function AbRow({ ab, onUpdate, onRemove, canRemove }) {
  return (
    <div className="ab-row">
      <input type="text" value={ab.name}
        onChange={e => onUpdate({ name: e.target.value })} />
      <div className="dil-wrap">
        <span>1:</span>
        <input type="number" value={ab.dilution} min={1}
          onChange={e => onUpdate({ dilution: e.target.value })} />
      </div>
      <input type="number" value={ab.vol} min={0} step={0.5}
        onChange={e => onUpdate({ vol: e.target.value })}
        style={{textAlign:'right'}} />
      <button className="del-btn" onClick={onRemove} disabled={!canRemove} aria-label="삭제">
        <i className="ti ti-x" style={{fontSize:13}} aria-hidden="true"/>
      </button>
    </div>
  );
}

// ── IHC Panel ────────────────────────────────────────────────────────────────
function IHCPanel({ cfg, onChange }) {
  const [sampleStr, setSampleStr] = useState(String(cfg.samples));
  const [copied, setCopied]       = useState(false);

  const commitSamples = raw => {
    const n = parseInt(raw, 10);
    const final = isNaN(n) || n < 1 ? 1 : n;
    setSampleStr(String(final));
    onChange({ samples: final });
  };

  const stepSamples = delta => {
    const n = Math.max(1, (+cfg.samples || 1) + delta);
    setSampleStr(String(n));
    onChange({ samples: n });
  };

  const updAb = (type, id, patch) => {
    const k = type === 'p' ? 'primaries' : 'secondaries';
    onChange({ [k]: cfg[k].map(a => a.id === id ? { ...a, ...patch } : a) });
  };
  const delAb = (type, id) => {
    const k = type === 'p' ? 'primaries' : 'secondaries';
    onChange({ [k]: cfg[k].filter(a => a.id !== id) });
  };
  const addAb = type => {
    const k = type === 'p' ? 'primaries' : 'secondaries';
    const n = cfg[k].length + 1;
    onChange({ [k]: [...cfg[k], {
      id: uid(),
      name: `${type === 'p' ? '1차' : '2차'} 항체 #${n}`,
      dilution: type === 'p' ? '500' : '1000',
      vol: '4',
    }]});
  };

  const r = calcIHC(cfg);
  const SPRESETS = [10, 20, 30];

  return (
    <div className="panel">
      {/* ── INPUTS ── */}
      <div>
        <div className="sec">기본 설정</div>

        {/* Samples */}
        <div className="frow">
          <label>샘플 수</label>
          <div className="sample-row">
            <button className="step-btn" onClick={() => stepSamples(-1)} aria-label="감소">–</button>
            <input
              className="sample-input"
              type="text" inputMode="numeric"
              value={sampleStr}
              onChange={e => {
                setSampleStr(e.target.value);
                const n = parseInt(e.target.value, 10);
                if (!isNaN(n) && n >= 1) onChange({ samples: n });
              }}
              onBlur={e => commitSamples(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }}
              aria-label="샘플 수"
            />
            <button className="step-btn" onClick={() => stepSamples(1)} aria-label="증가">+</button>
            <span className="unit">개</span>
          </div>
        </div>

        {/* Surplus */}
        <div className="frow">
          <label>여유분</label>
          <div className="s-grp">
            {SPRESETS.map(s => (
              <button key={s} className={`s-btn${cfg.surplus === s ? ' on' : ''}`}
                onClick={() => onChange({ surplus: s })}>+{s}%</button>
            ))}
            <input className="surplus-n" type="number" value={cfg.surplus} min={0} max={200}
              onChange={e => onChange({ surplus: +e.target.value })} />
            <span className="unit">%</span>
          </div>
        </div>

        <div className="sec">샘플당 기본 용량</div>
        {[{label:'PBST (세척)', key:'washVol'}, {label:'Blocking buffer', key:'blockVol'}].map(({ label, key }) => (
          <div key={key} className="vol-row">
            <label>{label}</label>
            <div className="vol-right">
              <input type="number" value={cfg[key]} min={0} step={1}
                onChange={e => onChange({ [key]: +e.target.value })} />
              <span className="unit">mL</span>
            </div>
          </div>
        ))}

        {/* Primary abs */}
        <div className="ab-hdr-row">
          <div className="sec">1차 항체</div>
          <button className="add-ab" onClick={() => addAb('p')}>
            <i className="ti ti-plus" style={{fontSize:11}} aria-hidden="true"/> 추가
          </button>
        </div>
        <div className="ab-cols">
          <span>이름</span><span>희석배율</span><span>mL/샘</span><span/>
        </div>
        {cfg.primaries.map(ab => (
          <AbRow key={ab.id} ab={ab}
            onUpdate={p => updAb('p', ab.id, p)}
            onRemove={() => delAb('p', ab.id)}
            canRemove={cfg.primaries.length > 1} />
        ))}

        {/* Secondary abs */}
        <div className="ab-hdr-row">
          <div className="sec">2차 항체</div>
          <button className="add-ab" onClick={() => addAb('s')}>
            <i className="ti ti-plus" style={{fontSize:11}} aria-hidden="true"/> 추가
          </button>
        </div>
        {cfg.secondaries.map(ab => (
          <AbRow key={ab.id} ab={ab}
            onUpdate={p => updAb('s', ab.id, p)}
            onRemove={() => delAb('s', ab.id)}
            canRemove={cfg.secondaries.length > 1} />
        ))}
      </div>

      {/* ── RESULTS ── */}
      <div>
        <div className="rsec">계산 결과</div>

        <RCard accent="blue" icon="ti-flask" title="PBST  (0.3% Triton X-100 in 1× PBS)" badge={fV(r.pbst)}>
          <RRow label="Triton X-100" value={fTriton(r.tritonUL)} />
          <RRow label="1× PBS (up to)" value={fV(r.pbsPortion)} />
          <div className="rdivider">
            <div className="rdivider-lbl">사용처 (참고)</div>
            <div className="tags">
              <span className="tag">세척: {fV(r.wash)}</span>
              <span className="tag">Blocking: {fV(r.block)}</span>
              <span className="tag">Ab Diluent: {fV(r.adTotal)}</span>
            </div>
          </div>
        </RCard>

        <RCard accent="teal" icon="ti-droplet" title="Blocking Buffer  (3% BSA in 0.3% PBST)" badge={fV(r.block)}>
          <RRow label="BSA" value={fM(r.blockBSAmg)} sub={fMsub(r.blockBSAmg)} />
          <RRow label="0.3% PBST (up to)" value={fV(r.block)} />
        </RCard>

        {r.adTotal > 0 && (
          <RCard accent="amber" icon="ti-droplet-half-2" title="Ab Diluent  (1% BSA in 0.3% PBST)" badge={fV(r.adTotal)}>
            <RRow label="BSA" value={fM(r.adBSAmg)} sub={fMsub(r.adBSAmg)} />
            <RRow label="0.3% PBST (up to)" value={fV(r.adTotal)} />
          </RCard>
        )}

        {r.pCalc.length > 0 && <>
          <div className="rsec">1차 항체 working solution</div>
          {r.pCalc.map(ab => (
            <RCard key={ab.id} accent="gray" icon="ti-circle-dot" title={ab.name} badge={`1:${ab.dilution}`}>
              <RRow label="Ab Diluent 사용량" value={fV(ab.adVol)} />
              <RRow label="항체 stock 첨가량" value={fLiq(ab.stock)} bold />
            </RCard>
          ))}
        </>}

        {r.sCalc.length > 0 && <>
          <div className="rsec">2차 항체 working solution</div>
          {r.sCalc.map(ab => (
            <RCard key={ab.id} accent="gray" icon="ti-circle" title={ab.name} badge={`1:${ab.dilution}`}>
              <RRow label="Ab Diluent 사용량" value={fV(ab.adVol)} />
              <RRow label="항체 stock 첨가량" value={fLiq(ab.stock)} bold />
            </RCard>
          ))}
        </>}

        <button
          className={`copy-btn${copied ? ' done' : ''}`}
          onClick={() => {
            navigator.clipboard.writeText(genText('IHC', cfg, r)).then(() => {
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            });
          }}>
          <i className={`ti ${copied ? 'ti-check' : 'ti-copy'}`} style={{fontSize:14}} aria-hidden="true"/>
          {copied ? '복사됨 ✓' : '레시피 텍스트 복사'}
        </button>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'reagent-calc-v1';

function loadTabs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}

function showSaveFlash() {
  const el = document.getElementById('save-flash');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function App() {
  const init = loadTabs() || [{ id: 't1', name: 'IHC', cfg: defCfg() }];
  const [tabs,   setTabs]   = useState(init);
  const [active, setActive] = useState(init[0].id);
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState('');

  // Persist on change
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs)); } catch {}
    showSaveFlash();
  }, [tabs]);

  const tab    = tabs.find(t => t.id === active);
  const updCfg = patch => setTabs(ts =>
    ts.map(t => t.id === active ? { ...t, cfg: { ...t.cfg, ...patch } } : t));

  const addTab = () => {
    const id = `t${uid()}`;
    setTabs(ts => [...ts, { id, name: `실험 ${ts.length + 1}`, cfg: defCfg() }]);
    setActive(id);
  };

  const remTab = id => {
    if (tabs.length === 1) return;
    const next = tabs.filter(t => t.id !== id);
    setTabs(next);
    if (active === id) setActive(next[next.length - 1].id);
  };

  const finishEdit = () => {
    if (editName.trim())
      setTabs(ts => ts.map(t => t.id === editId ? { ...t, name: editName.trim() } : t));
    setEditId(null);
  };

  return (
    <>
      <div className="tab-bar">
        {tabs.map(t => (
          <div key={t.id}>
            {editId === t.id ? (
              <input
                autoFocus className="tab-edit-input"
                value={editName}
                onChange={e => setEditName(e.target.value)}
                onBlur={finishEdit}
                onKeyDown={e => { if (e.key === 'Enter') finishEdit(); if (e.key === 'Escape') setEditId(null); }}
              />
            ) : (
              <button
                className={`tab-btn${active === t.id ? ' on' : ''}`}
                onClick={() => setActive(t.id)}
                onDoubleClick={() => { setEditId(t.id); setEditName(t.name); }}>
                {t.name}
                {tabs.length > 1 && (
                  <span className="tab-x"
                    onClick={e => { e.stopPropagation(); remTab(t.id); }}>×</span>
                )}
              </button>
            )}
          </div>
        ))}
        <button className="add-tab" onClick={addTab}>
          <i className="ti ti-plus" style={{fontSize:12}} aria-hidden="true"/> 프로토콜 추가
        </button>
      </div>

      {tab && <IHCPanel key={active} cfg={tab.cfg} onChange={updCfg} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
